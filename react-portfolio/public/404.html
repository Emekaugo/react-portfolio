<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Page Not Found</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        text-align: center;
      }

      h1 {
        font-size: 6rem;
        color: #22c55e;
        margin-bottom: 20px;
      }

      p {
        color: #9ca3af;
        margin-bottom: 40px;
        font-size: 1.1rem;
      }

      a {
        display: inline-block;
        text-decoration: none;
        color: #000;
        background: #22c55e;
        padding: 14px 28px;
        border-radius: 12px;
        font-weight: bold;
      }

      a:hover {
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>404</h1>

      <p>The page you're looking for doesn't exist.</p>

      <a href="/"> Return Home</a>
    </div>
  </body>
</html>
